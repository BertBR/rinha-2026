name: rinha-2026

x-api: &api-template
  build:
    context: .
    dockerfile: Dockerfile.api
  restart: unless-stopped
  volumes:
    - sockets:/sockets
  ulimits:
    nofile:
      soft: 65536
      hard: 65536

services:
  api1:
    <<: *api-template
    container_name: rinha-api1
    environment:
      UDS_PATH: /sockets/api1.sock
      WARMUP_QUERIES: 3000
    deploy:
      resources:
        limits:
          cpus: "0.40"
          memory: "155MB"

  api2:
    <<: *api-template
    container_name: rinha-api2
    environment:
      UDS_PATH: /sockets/api2.sock
      WARMUP_QUERIES: 3000
    deploy:
      resources:
        limits:
          cpus: "0.40"
          memory: "155MB"

  lb:
    build:
      context: .
      dockerfile: Dockerfile.lb
    container_name: rinha-lb
    restart: unless-stopped
    depends_on:
      - api1
      - api2
    volumes:
      - sockets:/sockets
    ports:
      - "9999:9999"
    deploy:
      resources:
        limits:
          cpus: "0.20"
          memory: "30MB"
    ulimits:
      nofile:
        soft: 65536
        hard: 65536

volumes:
  sockets:

networks:
  default:
    driver: bridge
